name: CI

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (dummy)
        run: |
          echo "Building..."
          echo "Build succeeded"

      - name: Test (dummy)
        run: |
          echo "Running tests..."
          echo "All tests passed"

  auto-merge:
    needs: build-and-test
    runs-on: ubuntu-latest
    # Only auto-merge Renovate's PRs; other PRs still get build+test but merge manually.
    if: startsWith(github.head_ref, 'renovate/')
    steps:
      - name: Merge PR into master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --merge --repo "$GITHUB_REPOSITORY" "${{ github.event.pull_request.number }}"
